name: Package Access

on:
  workflow_dispatch:

jobs:
  verify-access:
    name: Verify npm package access
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          scope: "@topogram"
      - name: Ensure public access
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm access set status=public @topogram/extractor-prisma-db
      - name: Verify public package resolution
        run: |
          for attempt in 1 2 3 4 5; do
            if npm view @topogram/extractor-prisma-db version --registry=https://registry.npmjs.org/; then
              exit 0
            fi
            echo "Package not visible yet; retrying in 15s ($attempt/5)."
            sleep 15
          done
          npm view @topogram/extractor-prisma-db version --registry=https://registry.npmjs.org/
