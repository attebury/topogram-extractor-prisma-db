name: Publish Extractor Package

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Package version to publish"
        required: true
        type: string
      dist_tag:
        description: "npm dist-tag"
        required: true
        default: latest
        type: string

jobs:
  publish:
    name: Publish to npmjs
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          scope: "@topogram"
      - name: Set package version
        run: |
          CURRENT="$(node -p "require('./package.json').version")"
          if [[ "$CURRENT" != "${{ inputs.version }}" ]]; then
            npm version "${{ inputs.version }}" --no-git-tag-version
          else
            echo "Package version already set to $CURRENT"
          fi
      - name: Verify
        run: |
          TOPOGRAM_CLI_VERSION="$(cat topogram-cli.version)"
          TOPOGRAM_CLI_PACKAGE_SPEC="@topogram/cli@$TOPOGRAM_CLI_VERSION" npm run check
      - name: Publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          if npm view "$PACKAGE_NAME@${{ inputs.version }}" version --registry=https://registry.npmjs.org/ >/dev/null 2>&1; then
            echo "$PACKAGE_NAME@${{ inputs.version }} already exists on npm; skipping publish."
          else
            npm publish --provenance --access public --tag "${{ inputs.dist_tag }}"
          fi
      - name: Ensure public access
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm access set status=public @topogram/extractor-prisma-db
      - name: Verify public package resolution
        run: |
          for attempt in 1 2 3 4 5; do
            if npm view @topogram/extractor-prisma-db version --registry=https://registry.npmjs.org/; then
              exit 0
            fi
            echo "Package not visible yet; retrying in 15s ($attempt/5)."
            sleep 15
          done
          npm view @topogram/extractor-prisma-db version --registry=https://registry.npmjs.org/
